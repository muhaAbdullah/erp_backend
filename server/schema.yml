openapi: 3.0.3
info:
  title: ERP Backend API
  version: 1.0.0
  description: REST API for user authentication and profile management.
paths:
  /api/hrm/departments/:
    get:
      operationId: hrm_departments_list
      description: Get list of departments in user's organization.
      summary: List departments
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      tags:
      - HRM - Master Data
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
          description: ''
    post:
      operationId: hrm_departments_create
      description: |-
        ViewSet for managing departments.

        Features:
        - Auto-assign organization from logged-in user
        - Permission-based access control (manage_hrm_masters or super admin)
        - Tenant filtering
        - Audit logging
      summary: Create department
      tags:
      - HRM - Master Data
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
        '400':
          description: Validation error
  /api/hrm/departments/{id}/:
    get:
      operationId: hrm_departments_retrieve
      description: |-
        ViewSet for managing departments.

        Features:
        - Auto-assign organization from logged-in user
        - Permission-based access control (manage_hrm_masters or super admin)
        - Tenant filtering
        - Audit logging
      summary: Retrieve department
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Department.
        required: true
      tags:
      - HRM - Master Data
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
        '404':
          description: Not found
    put:
      operationId: hrm_departments_update
      description: |-
        ViewSet for managing departments.

        Features:
        - Auto-assign organization from logged-in user
        - Permission-based access control (manage_hrm_masters or super admin)
        - Tenant filtering
        - Audit logging
      summary: Update department
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Department.
        required: true
      tags:
      - HRM - Master Data
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
        '400':
          description: Validation error
    patch:
      operationId: hrm_departments_partial_update
      description: |-
        ViewSet for managing departments.

        Features:
        - Auto-assign organization from logged-in user
        - Permission-based access control (manage_hrm_masters or super admin)
        - Tenant filtering
        - Audit logging
      parameters:
      - in: path
        name: id
