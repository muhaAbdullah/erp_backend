components:
  schemas:
    AccountStatusRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    AccountStatusResponse:
      type: object
      properties:
        message:
          type: boolean
        status:
          type: string
        user_type:
          type: string
      required:
      - message
      - status
      - user_type
    ActionEnum:
      enum:
      - CREATE
      - UPDATE
      - DELETE
      - LOGIN
      - LOGOUT
      - ASSIGN_PERMISSION
      - REMOVE_PERMISSION
      type: string
      description: |-
        * `CREATE` - Create
        * `UPDATE` - Update
        * `DELETE` - Delete
        * `LOGIN` - Login
        * `LOGOUT` - Logout
        * `ASSIGN_PERMISSION` - Assign Permission
        * `REMOVE_PERMISSION` - Remove Permission
    ActivationSuccess:
      type: object
      properties:
        message:
          type: string
        status:
          type: string
      required:
      - message
      - status
    AdminCreateUserProfileRequestRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          description: User first name
        last_name:
          type: string
          minLength: 1
          description: User last name
    AdminCreateUserRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: User email address
        username:
          type: string
          minLength: 1
          description: Unique username
        password:
          type: string
          writeOnly: true
          minLength: 1
          description: User password
        organization_id:
          type: integer
          description: Organization ID (required for super admin, ignored for org
            admin)
        role_id:
          type: integer
          description: Role ID (must belong to same organization)
        profile:
          allOf:
          - $ref: '#/components/schemas/AdminCreateUserProfileRequestRequest'
          description: Optional user profile information
      required:
      - email
      - password
      - username
    AdminCreateUserSuccess:
      type: object
      properties:
        message:
          type: string
        user_id:
          type: integer
        email:
          type: string
          format: email
      required:
      - email
      - message
      - user_id
    AssignPermissionRequest:
      type: object
      description: Serializer for assigning permissions to a role.
      properties:
        role_id:
          type: integer
        permission_ids:
          type: array
          items:
            type: integer
          description: List of permission IDs to assign to the role
      required:
      - permission_ids
      - role_id
    AuditLog:
      type: object
      description: Read-only serializer for audit logs.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
          description: User who performed the action
        user_email:
          type: string
          format: email
          readOnly: true
          nullable: true
        user_name:
          type: string
          readOnly: true
          nullable: true
        organization:
          type: integer
          readOnly: true
          nullable: true
          description: Organization this record belongs to
        organization_name:
          type: string
          readOnly: true
          nullable: true
        action:
          allOf:
          - $ref: '#/components/schemas/ActionEnum'
          readOnly: true
          description: |-
            Type of action performed

            * `CREATE` - Create
            * `UPDATE` - Update
            * `DELETE` - Delete
            * `LOGIN` - Login
            * `LOGOUT` - Logout
            * `ASSIGN_PERMISSION` - Assign Permission
            * `REMOVE_PERMISSION` - Remove Permission
        action_display:
          type: string
          readOnly: true
        model_name:
          type: string
          readOnly: true
          description: Name of the model affected (e.g., User, Role, Organization)
        object_id:
          type: string
          readOnly: true
          nullable: true
          description: ID of the affected object
        changes:
          readOnly: true
          description: JSON object storing before/after changes
        ip_address:
          type: string
          readOnly: true
          nullable: true
          description: IP address of the client
        user_agent:
          type: string
          readOnly: true
          nullable: true
          description: Browser/client user agent string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - action_display
      - changes
      - created_at
      - id
      - ip_address
      - model_name
      - object_id
      - organization
      - organization_name
      - user
      - user_agent
      - user_email
      - user_name
    BlankEnum:
      enum:
      - ''
    BloodGroupEnum:
      enum:
      - A+
      - A-
      - B+
      - B-
      - O+
      - O-
      - AB+
      - AB-
      type: string
      description: |-
        * `A+` - A+
        * `A-` - A-
        * `B+` - B+
        * `B-` - B-
        * `O+` - O+
        * `O-` - O-
        * `AB+` - AB+
        * `AB-` - AB-
    ChangePassword:
      type: object
      description: Serializer for password change endpoint.
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    ChangePasswordRequest:
      type: object
      description: Serializer for password change endpoint.
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 1
      required:
      - new_password
      - old_password
    CreateSuperAdminRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: Super admin email address
        username:
          type: string
          minLength: 1
          description: Unique username
        password:
          type: string
          writeOnly: true
          minLength: 1
          description: Super admin password
      required:
      - email
      - password
      - username
    CreateSuperAdminSuccess:
      type: object
      properties:
        message:
          type: string
        user_id:
          type: integer
        email:
          type: string
          format: email
        username:
          type: string
      required:
      - email
      - message
      - user_id
      - username
    Department:
