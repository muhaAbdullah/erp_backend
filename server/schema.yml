components:
  schemas:
    AccountStatusRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    AccountStatusResponse:
      type: object
      properties:
        message:
          type: boolean
        status:
          type: string
        user_type:
          type: string
      required:
      - message
      - status
      - user_type
    ActivationSuccess:
      type: object
      properties:
        message:
          type: string
        status:
          type: string
      required:
      - message
      - status
    AdminCreateUserProfileRequestRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          description: User first name
        last_name:
          type: string
          minLength: 1
          description: User last name
    AdminCreateUserRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: User email address
        username:
          type: string
          minLength: 1
          description: Unique username
        password:
          type: string
          writeOnly: true
          minLength: 1
          description: User password
        organization_id:
          type: integer
          description: Organization ID (required for super admin, ignored for org
            admin)
        role_id:
          type: integer
          description: Role ID (must belong to same organization)
        profile:
          allOf:
          - $ref: '#/components/schemas/AdminCreateUserProfileRequestRequest'
          description: Optional user profile information
      required:
      - email
      - password
      - username
    AdminCreateUserSuccess:
      type: object
      properties:
        message:
          type: string
        user_id:
          type: integer
        email:
          type: string
          format: email
      required:
      - email
      - message
      - user_id
    AssignPermissionRequest:
      type: object
      description: Serializer for assigning permissions to a role.
      properties:
        role_id:
          type: integer
        permission_ids:
          type: array
          items:
            type: integer
          description: List of permission IDs to assign to the role
      required:
      - permission_ids
      - role_id
    ChangePassword:
      type: object
      description: Serializer for password change endpoint.
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    ChangePasswordRequest:
      type: object
      description: Serializer for password change endpoint.
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 1
      required:
      - new_password
      - old_password
    EmailExistRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    EmailExistTrue:
      type: object
      properties:
        message:
          type: boolean
        status:
          type: string
      required:
      - message
      - status
    ForgetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    ForgetPasswordSuccess:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    Organization:
      type: object
      description: Serializer for Organization model.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        users_count:
          type: string
          readOnly: true
        roles_count:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - roles_count
      - updated_at
      - users_count
    OrganizationList:
      type: object
      description: Lightweight serializer for listing organizations.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        is_active:
          type: boolean
      required:
      - id
      - name
    OrganizationListRequest:
      type: object
      description: Lightweight serializer for listing organizations.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        is_active:
          type: boolean
      required:
      - name
    OrganizationRequest:
      type: object
      description: Serializer for Organization model.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
      required:
      - name
    PaginatedUserProfileList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
    PatchedChangePasswordRequest:
      type: object
      description: Serializer for password change endpoint.
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 1
    PatchedOrganizationRequest:
      type: object
      description: Serializer for Organization model.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
    PatchedPermissionRequest:
      type: object
      description: Serializer for Permission model.
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable permission name (e.g., 'Create User')
          maxLength: 255
        permission_code:
          type: string
          minLength: 1
          description: Unique code for permission (e.g., 'user.create')
          maxLength: 255
        description:
          type: string
          nullable: true
    PatchedRoleRequest:
      type: object
      description: |-
        Serializer for Role model with strict organization enforcement.

        Organization is read-only and automatically assigned from the logged-in user.
        This prevents API clients from creating roles in other organizations.
      properties:
        name:
          type: string
          minLength: 1
          description: Role name (e.g., 'Admin', 'Manager', 'User')
          maxLength: 255
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
    PatchedUserDetailRequest:
      type: object
      description: |-
        Serializer for User details with role-organization validation.

        Organization is read-only to prevent users from changing their organization.
        Role assignment is validated to ensure it belongs to the user's organization.
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 1
          title: Email address
          maxLength: 255
        user_type:
          $ref: '#/components/schemas/UserTypeEnum'
        is_active:
          type: boolean
        role:
          type: integer
          nullable: true
          description: Role assigned to this user
        profile:
          $ref: '#/components/schemas/UserProfileRequest'
    PatchedUserPartialUpdateRequestRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Username
        email:
          type: string
          format: email
          minLength: 1
          description: Email address
        user_type:
          type: string
          minLength: 1
          description: User type
        is_active:
          type: boolean
          description: Account active status
        organization:
          type: integer
          description: Organization ID
        role:
          type: integer
          description: Role ID
        profile:
          $ref: '#/components/schemas/ProfilePartialUpdateRequestRequest'
    PatchedUserProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 255
        last_name:
          type: string
          minLength: 1
          maxLength: 255
        image:
          type: string
          format: binary
          nullable: true
    Permission:
      type: object
      description: Serializer for Permission model.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Human-readable permission name (e.g., 'Create User')
          maxLength: 255
        permission_code:
          type: string
          description: Unique code for permission (e.g., 'user.create')
          maxLength: 255
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - permission_code
      - updated_at
    PermissionList:
      type: object
      description: Lightweight serializer for listing permissions.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Human-readable permission name (e.g., 'Create User')
          maxLength: 255
        permission_code:
          type: string
          description: Unique code for permission (e.g., 'user.create')
          maxLength: 255
      required:
      - id
      - name
      - permission_code
    PermissionListRequest:
      type: object
      description: Lightweight serializer for listing permissions.
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable permission name (e.g., 'Create User')
          maxLength: 255
        permission_code:
          type: string
          minLength: 1
          description: Unique code for permission (e.g., 'user.create')
          maxLength: 255
      required:
      - name
      - permission_code
    PermissionRequest:
      type: object
      description: Serializer for Permission model.
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable permission name (e.g., 'Create User')
          maxLength: 255
        permission_code:
          type: string
          minLength: 1
          description: Unique code for permission (e.g., 'user.create')
          maxLength: 255
        description:
          type: string
          nullable: true
      required:
      - name
      - permission_code
    ProfilePartialUpdateRequestRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          description: First name
        last_name:
          type: string
          minLength: 1
          description: Last name
        image:
          type: string
          format: binary
          description: Profile image
    ProfileResponse:
      type: object
      properties:
        id:
          type: integer
          description: Profile ID
        first_name:
          type: string
          description: First name
        last_name:
          type: string
          description: Last name
        image:
          type: string
          format: uri
          nullable: true
          description: Profile image URL
      required:
      - first_name
      - id
      - image
      - last_name
    ProfileUpdateRequestRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          description: First name
        last_name:
          type: string
          minLength: 1
          description: Last name
        image:
          type: string
          format: binary
          description: Profile image
    RegisterDisabled:
      type: object
      properties:
        error:
          type: string
          description: Error message
        message:
          type: string
          description: Instruction message
      required:
      - error
