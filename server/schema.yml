openapi: 3.0.3
info:
  title: ERP Backend API
  version: 1.0.0
  description: REST API for user authentication and profile management.
paths:
  /api/user-profile/user-profile/:
    get:
      operationId: user_profile_user_profile_list
      description: Returns a paginated list of all active user profiles. Supports
        filtering by user, user_type, is_active, is_staff, is_superuser, and email.
        Supports full-text search on first_name, last_name, and username.
      summary: List user profiles
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Number of results to return (default 100, max 100).
      - in: query
        name: offset
        schema:
          type: integer
        description: Starting position in the result set.
      - in: query
        name: search
        schema:
          type: string
        description: Search by first_name, last_name, or username.
      - in: query
        name: user
        schema:
          type: integer
        description: Filter by user ID.
      - in: query
        name: user__email
        schema:
          type: string
        description: Filter by exact email address.
      - in: query
        name: user__is_active
        schema:
          type: boolean
        description: Filter by account active status.
      - in: query
        name: user__is_staff
        schema:
          type: boolean
      - in: query
        name: user__is_superuser
        schema:
          type: boolean
      - in: query
        name: user__user_type
        schema:
          type: string
        description: 'Filter by user type: user, admin, super_admin.'
      tags:
      - User Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserProfileList'
          description: ''
    post:
      operationId: user_profile_user_profile_create
      description: Creates a new profile for the authenticated user.
      summary: Create a user profile
      tags:
      - User Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/user-profile/user-profile/{username}/:
    get:
      operationId: user_profile_user_profile_retrieve
      description: Returns the profile for the given username.
      summary: Retrieve a user profile
      parameters:
      - in: path
        name: username
        schema:
          type: string
        description: Username of the user whose profile to retrieve.
        required: true
      tags:
      - User Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: user_profile_user_profile_update
      description: Fully updates the profile for the given username. Requires authentication.
      summary: Update a user profile
      parameters:
      - in: path
        name: username
        schema:
          type: string
        description: Username of the user whose profile to update.
        required: true
      tags:
      - User Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: user_profile_user_profile_partial_update
      description: Partially updates the profile for the given username. Requires
        authentication.
      summary: Partial update a user profile
      parameters:
      - in: path
        name: username
        schema:
          type: string
        description: Username of the user whose profile to partially update.
        required: true
      tags:
      - User Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    delete:
      operationId: user_profile_user_profile_destroy
      description: Deletes the profile for the given username. Requires authentication.
      summary: Delete a user profile
      parameters:
      - in: path
        name: username
        schema:
          type: string
        description: Username of the user whose profile to delete.
        required: true
      tags:
      - User Profile
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/user/account-activation/{secret_key}:
    post:
      operationId: user_account_activation_create
      description: Activates a user account using the secret key sent to the user's
        email. The token expires 30 minutes after registration.
      summary: Activate user account
      parameters:
      - in: path
        name: secret_key
        schema:
          type: string
        description: 50-character activation token sent to the user's email.
        required: true
      tags:
      - Auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationSuccess'
          description: Account activated successfully.
        '400':
          description: Already activated or invalid token.
        '406':
          description: User not found.
  /api/user/account-status/:
    post:
      operationId: user_account_status_create
      description: Returns whether the account for the given email is active, along
        with the user's type (user / admin / super_admin).
      summary: Check account status
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountStatusRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountStatusRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountStatusRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStatusResponse'
          description: Account status returned.
        '404':
          description: User not found.
        '500':
          description: Internal server error.
  /api/user/change-password/:
    put:
      operationId: user_change_password_update
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePassword'
          description: ''
    patch:
      operationId: user_change_password_partial_update
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedChangePasswordRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePassword'
          description: ''
  /api/user/create-user/:
    post:
      operationId: user_create_user_create
      description: Create a new user. Super admin must provide organization_id, org
        admin creates in their own organization.
      summary: Create User (Admin Only)
      tags:
      - User Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateUserSuccess'
          description: User created successfully
        '400':
          description: Validation error
        '403':
          description: Permission denied
        '404':
          description: Organization or Role not found
  /api/user/email-exist/:
    post:
      operationId: user_email_exist_create
      description: Returns whether the given email address is already registered in
        the system.
      summary: Check if email exists
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailExistRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailExistRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailExistRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailExistTrue'
          description: Email exists.
        '400':
          description: Email does not exist.
        '500':
          description: Internal server error.
  /api/user/forget-password/:
    post:
      operationId: user_forget_password_create
      description: Sends a password-reset link to the given email address. The link
        is valid for 15 minutes.
      summary: Request password reset
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgetPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgetPasswordSuccess'
          description: Reset email sent.
        '400':
          description: User not found.
  /api/user/login/:
    post:
      operationId: user_login_create
      description: Authenticates a user with email and password, returns an access
        and refresh JWT token pair.
      summary: Login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/user/me/:
    get:
      operationId: user_me_retrieve
      description: Returns the complete profile details of the currently authenticated
        user, including organization, role, permissions, and profile information.
      summary: Get current user
      tags:
      - User
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
          description: Current user details
        '401':
          description: Authentication credentials not provided or invalid.
    put:
      operationId: user_me_update
      description: Fully updates the profile of the currently authenticated user.
        You can update user fields and nested profile information. Organization and
        role can be updated if permitted.
      summary: Update current user
      tags:
      - User
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdateRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdateRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          description: User updated successfully
        '400':
          description: Validation error.
        '401':
          description: Authentication credentials not provided or invalid.
    patch:
      operationId: user_me_partial_update
      description: Partially updates the profile of the currently authenticated user.
        Only the fields provided will be updated. Others remain unchanged.
      summary: Partial update current user
      tags:
      - User
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserPartialUpdateRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserPartialUpdateRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserPartialUpdateRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          description: User updated successfully
        '400':
          description: Validation error.
        '401':
          description: Authentication credentials not provided or invalid.
    delete:
      operationId: user_me_destroy
      description: Deletes the account of the currently authenticated user. This action
        is irreversible.
      summary: Delete current user
      tags:
      - User
      security:
      - jwtAuth: []
      responses:
        '204':
          description: User deleted successfully
        '401':
          description: Authentication credentials not provided or invalid.
  /api/user/organizations/:
    get:
      operationId: user_organizations_list
      description: Get list of organizations. Super admins see all, regular users
        see only their organization.
      summary: List all organizations
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
        description: Filter by active status
      - in: query
        name: search
        schema:
          type: string
        description: Search by name or description
      tags:
      - Organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationList'
          description: ''
    post:
      operationId: user_organizations_create
      description: Create a new organization. Only super admins can perform this action.
      summary: Create new organization
      tags:
      - Organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
        '400':
          description: Validation error
        '403':
          description: Permission denied
  /api/user/organizations/{id}/:
    get:
      operationId: user_organizations_retrieve
      description: Get detailed information about a specific organization.
      summary: Retrieve organization details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Organization.
        required: true
      tags:
      - Organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
        '404':
          description: Organization not found
    put:
      operationId: user_organizations_update
      description: Update an existing organization. Only super admins can perform
        this action.
      summary: Update organization
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Organization.
        required: true
      tags:
      - Organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
        '400':
          description: Validation error
        '403':
          description: Permission denied
        '404':
          description: Organization not found
    patch:
      operationId: user_organizations_partial_update
      description: Partially update an organization. Only super admins can perform
        this action.
      summary: Partial update organization
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Organization.
        required: true
      tags:
      - Organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
        '400':
          description: Validation error
        '403':
          description: Permission denied
        '404':
          description: Organization not found
    delete:
      operationId: user_organizations_destroy
      description: Delete an organization. Only super admins can perform this action.
      summary: Delete organization
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Organization.
        required: true
      tags:
      - Organizations
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Organization deleted successfully
        '403':
          description: Permission denied
        '404':
          description: Organization not found
  /api/user/organizations/{id}/statistics/:
    get:
      operationId: user_organizations_statistics_retrieve
      description: Get statistics for a specific organization (users count, roles
        count, etc.)
      summary: Get organization statistics
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Organization.
        required: true
      tags:
      - Organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  users_count:
                    type: integer
                  roles_count:
                    type: integer
                  active_users_count:
                    type: integer
          description: Organization statistics
        '404':
          description: Organization not found
  /api/user/permissions/:
    get:
      operationId: user_permissions_list
      description: Get list of all available permissions in the system.
      summary: List all permissions
      parameters:
      - in: query
        name: search
        schema:
          type: string
        description: Search by name, code or description
      tags:
      - Permissions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermissionList'
          description: ''
    post:
      operationId: user_permissions_create
      description: Create a new permission. Only super admins can perform this action.
      summary: Create new permission
      tags:
      - Permissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
          description: ''
        '400':
          description: Validation error
        '403':
          description: Permission denied
  /api/user/permissions/{id}/:
    get:
      operationId: user_permissions_retrieve
      description: Get detailed information about a specific permission.
      summary: Retrieve permission details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Permission.
        required: true
      tags:
      - Permissions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
          description: ''
        '404':
          description: Permission not found
    put:
      operationId: user_permissions_update
      description: Update an existing permission. Only super admins can perform this
        action.
      summary: Update permission
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Permission.
        required: true
      tags:
      - Permissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
          description: ''
        '400':
          description: Validation error
        '403':
          description: Permission denied
        '404':
          description: Permission not found
    patch:
      operationId: user_permissions_partial_update
      description: Partially update a permission. Only super admins can perform this
        action.
      summary: Partial update permission
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Permission.
        required: true
      tags:
      - Permissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPermissionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPermissionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPermissionRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
          description: ''
        '400':
          description: Validation error
        '403':
          description: Permission denied
        '404':
          description: Permission not found
    delete:
      operationId: user_permissions_destroy
      description: Delete a permission. Only super admins can perform this action.
      summary: Delete permission
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Permission.
        required: true
      tags:
      - Permissions
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Permission deleted successfully
        '403':
          description: Permission denied
        '404':
          description: Permission not found
  /api/user/register/:
    post:
      operationId: user_register_create
      description: Public registration is disabled. Please contact your system administrator
        to create an account. Admins can create users via POST /api/user/create-user/
        or POST /api/user/users/
      summary: Public registration (DISABLED)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequestRequest'
      security:
      - jwtAuth: []
      - {}
      responses:
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDisabled'
              examples:
                RegistrationAttempt:
                  value:
                    error: Public registration is disabled
                    message: Please contact your system administrator to create an
                      account
                  summary: Registration attempt
          description: Public registration is disabled
  /api/user/resend-activation/:
    post:
      operationId: user_resend_activation_create
      description: Resends the account activation email to the given address. Only
        valid for accounts that have not yet been activated.
      summary: Resend activation email
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendEmailRequest'
          application/x-www-form-urlencoded:
            schema:
